name: Release

on:
  push:
    branches: [main]

jobs:
  tag_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Compute Version (fallback patch)
        id: ver
        run: |
          LAST=$(git tag --sort=-v:refname | head -n 1)
          if [ -z "$LAST" ]; then echo "version=v0.1.0" >> $GITHUB_OUTPUT; exit 0; fi
          RAW=${LAST#v}; IFS='.' read -r MAJ MIN PAT <<< "$RAW"
          PAT=$((PAT+1))
          echo "version=v${MAJ}.${MIN}.${PAT}" >> $GITHUB_OUTPUT
      - name: Create Tag
        run: |
          git tag ${{ steps.ver.outputs.version }}
          git push origin ${{ steps.ver.outputs.version }}
