name: Nightly Browser Monitor

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm ci || npm install
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - name: Run Scheduled Monitor
        run: node scripts/browser/scheduled-monitor.js
